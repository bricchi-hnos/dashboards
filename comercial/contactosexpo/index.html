<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#c8220a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bricchi — Stand Apache</title>
<link rel="manifest" href="manifest.json">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --rojo: #c8220a;
    --rojo-oscuro: #9e1808;
    --rojo-suave: #f5e8e6;
    --negro: #141414;
    --gris-oscuro: #2a2a2a;
    --gris-medio: #555;
    --gris-claro: #e8e8e8;
    --blanco: #fff;
    --verde: #1a7a3c;
    --verde-claro: #e6f4ec;
    --amarillo: #f5a623;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #f2f0ed;
    min-height: 100vh;
    color: var(--negro);
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: var(--negro);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header-stripe {
    height: 6px;
    background: var(--rojo);
  }
  .header-inner {
    padding: 20px 24px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-circle {
    width: 52px; height: 52px;
    background: var(--rojo);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900;
    color: white;
    letter-spacing: -1px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900;
    color: white;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .header-text p {
    font-size: 12px; font-weight: 500;
    color: #aaa;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .counter-badge {
    margin-left: auto;
    background: var(--rojo);
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900;
    width: 54px; height: 54px;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    line-height: 1;
    flex-shrink: 0;
  }
  .counter-badge span {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--gris-oscuro);
  }
  .tab {
    flex: 1; padding: 14px 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #888;
    border: none; background: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
  }
  .tab.active {
    color: white;
    border-bottom-color: var(--rojo);
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── FORM VIEW ── */
  .form-section {
    padding: 20px 20px 0;
  }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gris-medio);
    margin-bottom: 10px;
  }

  .field-group {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }
  .field {
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--gris-claro);
    gap: 12px;
    min-height: 58px;
  }
  .field:last-child { border-bottom: none; }
  .field-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .field-body { flex: 1; padding: 10px 0; }
  .field-body label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: var(--gris-medio);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .field-body input {
    width: 100%;
    border: none; outline: none;
    font-family: 'Barlow', sans-serif;
    font-size: 18px; font-weight: 500;
    color: var(--negro);
    background: transparent;
    padding: 0;
  }
  .field-body input::placeholder { color: #bbb; font-weight: 400; }
  .field-body input[type="tel"] { font-size: 22px; font-weight: 600; letter-spacing: 1px; }

  /* ── PRODUCTO SELECTOR ── */
  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .prod-btn {
    background: white;
    border: 2.5px solid var(--gris-claro);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .prod-btn .prod-icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .prod-btn .prod-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--negro);
    letter-spacing: 0.3px;
  }
  .prod-btn.selected {
    border-color: var(--rojo);
    background: var(--rojo-suave);
  }
  .prod-btn.selected .prod-name { color: var(--rojo-oscuro); }

  /* ── OBSERVACIONES ── */
  .obs-wrap {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }
  .obs-wrap textarea {
    width: 100%; border: none; outline: none;
    font-family: 'Barlow', sans-serif;
    font-size: 16px; color: var(--negro);
    padding: 16px;
    resize: none; background: transparent;
    min-height: 90px;
  }
  .obs-wrap textarea::placeholder { color: #bbb; }

  /* ── SAVE BUTTON ── */
  .btn-save {
    display: block; width: calc(100% - 40px);
    margin: 4px 20px 24px;
    background: var(--rojo);
    color: white;
    border: none; border-radius: 14px;
    padding: 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(200,34,10,.35);
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(200,34,10,.25); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--negro);
    color: white; padding: 14px 24px;
    border-radius: 50px;
    font-size: 15px; font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,.3);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── WHATSAPP MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 100;
    align-items: flex-end; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: white; width: 100%; max-width: 480px;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px;
    animation: slideUp .3s cubic-bezier(.34,1.2,.64,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--gris-claro);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    margin-bottom: 6px;
  }
  .modal .wa-number {
    font-size: 28px; font-weight: 700;
    color: var(--rojo);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 2px;
    margin: 12px 0;
  }
  .modal .wa-preview {
    background: #e8f5e9;
    border-radius: 12px 12px 12px 4px;
    padding: 14px 16px;
    font-size: 14px; line-height: 1.5;
    color: #1a1a1a;
    margin-bottom: 20px;
    border-left: 4px solid #25D366;
  }
  .btn-whatsapp {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 17px;
    background: #25D366; color: white;
    border: none; border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 19px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(37,211,102,.35);
    margin-bottom: 12px;
  }
  .btn-cancel {
    display: block; width: 100%; padding: 14px;
    background: none; border: 2px solid var(--gris-claro);
    border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px; font-weight: 600; color: var(--gris-medio);
    cursor: pointer;
  }

  /* ── LIST VIEW ── */
  .list-header {
    padding: 16px 20px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .list-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    flex: 1;
  }
  .btn-export {
    background: var(--negro); color: white;
    border: none; border-radius: 10px;
    padding: 10px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-clear-all {
    background: none; color: #999;
    border: 1.5px solid #ddd; border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }

  .contact-card {
    background: white;
    margin: 8px 20px;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    display: flex; gap: 14px; align-items: flex-start;
  }
  .contact-num {
    background: var(--rojo); color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 900;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-info { flex: 1; }
  .contact-info .cn { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .contact-info .ct {
    font-size: 20px; font-weight: 700;
    color: var(--rojo); letter-spacing: 1px;
    margin: 2px 0;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .contact-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .tag {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase;
    background: var(--rojo-suave); color: var(--rojo-oscuro);
  }
  .contact-obs { font-size: 13px; color: #777; margin-top: 5px; font-style: italic; }
  .contact-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-wa-small {
    background: #25D366; color: white;
    border: none; border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.3px;
  }
  .btn-del {
    background: none; color: #ccc;
    border: 1.5px solid #e0e0e0; border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .contact-time { font-size: 11px; color: #bbb; margin-top: 4px; }

  .empty-state {
    text-align: center; padding: 60px 30px;
    color: #bbb;
  }
  .empty-state .big { font-size: 56px; margin-bottom: 10px; }
  .empty-state p { font-size: 15px; }

  .list-bottom { height: 30px; }
</style>
</head>
<body>

<header>
  <div class="header-stripe"></div>
  <div class="header-inner">
    <div class="logo-circle">B</div>
    <div class="header-text">
      <h1>BRICCHI HNOS.</h1>
      <p>Stand Apache · Expo 2026</p>
    </div>
    <div class="counter-badge" id="counterBadge">
      <span id="counterNum">0</span>
      <span>contactos</span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('form')">➕ Nuevo</button>
  <button class="tab" onclick="switchTab('list')">📋 Contactos</button>
</div>

<!-- ══════════ FORM VIEW ══════════ -->
<div class="view active" id="view-form">

  <div class="form-section">
    <div class="section-label">Datos del productor</div>
    <div class="field-group">
      <div class="field">
        <div class="field-icon">👤</div>
        <div class="field-body">
          <label>Nombre y Apellido</label>
          <input type="text" id="fNombre" placeholder="Juan García" autocomplete="off" inputmode="text">
        </div>
      </div>
      <div class="field">
        <div class="field-icon">📱</div>
        <div class="field-body">
          <label>Celular / WhatsApp</label>
          <input type="tel" id="fCelular" placeholder="358 412 3456" inputmode="tel" autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">¿Qué le interesa?</div>
    <div class="product-grid" id="productGrid">
      <button class="prod-btn" data-prod="Sembradoras Apache" onclick="toggleProd(this)">
        <span class="prod-icon">🌱</span>
        <div class="prod-name">Sembradoras Apache</div>
      </button>
      <button class="prod-btn" data-prod="Tractores Michigan" onclick="toggleProd(this)">
        <span class="prod-icon">🚜</span>
        <div class="prod-name">Tractores Michigan</div>
      </button>
      <button class="prod-btn" data-prod="Palas Cargadoras" onclick="toggleProd(this)">
        <span class="prod-icon">🏗️</span>
        <div class="prod-name">Palas Cargadoras</div>
      </button>
      <button class="prod-btn" data-prod="Otros" onclick="toggleProd(this)">
        <span class="prod-icon">⚙️</span>
        <div class="prod-name">Otros</div>
      </button>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">Observaciones</div>
    <div class="obs-wrap">
      <textarea id="fObs" placeholder="Hectáreas, condición de pago, modelo consultado, urgencia..."></textarea>
    </div>
  </div>

  <button class="btn-save" onclick="guardarContacto()">
    GUARDAR CONTACTO
  </button>
</div>

<!-- ══════════ LIST VIEW ══════════ -->
<div class="view" id="view-list">
  <div class="list-header">
    <h2>Contactos del día</h2>
    <button class="btn-clear-all" onclick="limpiarTodo()">🗑</button>
    <button class="btn-export" onclick="exportarCSV()">⬇ CSV</button>
  </div>
  <div id="listaContactos"></div>
  <div class="list-bottom"></div>
</div>

<!-- ══════════ WHATSAPP MODAL ══════════ -->
<div class="overlay" id="waOverlay" onclick="cerrarModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>📲 Enviar por WhatsApp</h3>
    <div class="wa-number" id="waNumero">—</div>
    <div class="wa-preview" id="waPreview"></div>
    <button class="btn-whatsapp" onclick="abrirWhatsapp()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.121 1.533 5.851L.057 23.571a.75.75 0 0 0 .93.899l5.876-1.522A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.746 9.746 0 0 1-4.971-1.358l-.356-.212-3.688.955.988-3.595-.232-.369A9.735 9.735 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
      ABRIR WHATSAPP
    </button>
    <button class="btn-cancel" onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── ESTADO ──────────────────────────────────────────────────
const STORAGE_KEY = 'bricchi_contactos_expo2026';
let contactos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let selectedProds = new Set();
let waContactIdx = null;

const WA_MENSAJE = (nombre, prods) => {
  const prodsText = prods.length ? prods.join(', ') : 'nuestros productos';
  return `Hola ${nombre}! 👋 Le escribimos de *Bricchi Hnos.* — fue un gusto charlar en el stand de Apache. Le acercamos la información sobre *${prodsText}* que nos consultó. Cualquier duda estamos a disposición. Saludos!`;
};

// ── TABS ────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['form','list'][i] === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
  if (tab === 'list') renderLista();
}

// ── PRODUCTOS ───────────────────────────────────────────────
function toggleProd(btn) {
  const p = btn.dataset.prod;
  if (selectedProds.has(p)) { selectedProds.delete(p); btn.classList.remove('selected'); }
  else { selectedProds.add(p); btn.classList.add('selected'); }
}

// ── GUARDAR ─────────────────────────────────────────────────
function guardarContacto() {
  const nombre = document.getElementById('fNombre').value.trim();
  const celular = document.getElementById('fCelular').value.trim();
  const obs = document.getElementById('fObs').value.trim();

  if (!nombre) { showToast('⚠️ Ingresá el nombre'); return; }
  if (!celular) { showToast('⚠️ Ingresá el celular'); return; }

  const nuevo = {
    id: Date.now(),
    nombre,
    celular,
    productos: [...selectedProds],
    obs,
    hora: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
  };

  contactos.unshift(nuevo);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(contactos));
  actualizarCounter();

  const idx = 0;
  resetForm();
  showToast('✅ ' + nombre + ' guardado');

  // Mostrar modal WhatsApp
  setTimeout(() => mostrarModalWA(0), 600);
}

function resetForm() {
  document.getElementById('fNombre').value = '';
  document.getElementById('fCelular').value = '';
  document.getElementById('fObs').value = '';
  selectedProds.clear();
  document.querySelectorAll('.prod-btn').forEach(b => b.classList.remove('selected'));
}

// ── CONTADOR ────────────────────────────────────────────────
function actualizarCounter() {
  document.getElementById('counterNum').textContent = contactos.length;
}
actualizarCounter();

// ── LISTA ───────────────────────────────────────────────────
function renderLista() {
  const el = document.getElementById('listaContactos');
  if (!contactos.length) {
    el.innerHTML = `<div class="empty-state"><div class="big">📋</div><p>Todavía no hay contactos.<br>¡A vender!</p></div>`;
    return;
  }
  el.innerHTML = contactos.map((c, i) => `
    <div class="contact-card">
      <div class="contact-num">${contactos.length - i}</div>
      <div class="contact-info">
        <div class="cn">${c.nombre}</div>
        <div class="ct">${c.celular}</div>
        ${c.productos.length ? `<div class="contact-tags">${c.productos.map(p => `<span class="tag">${p}</span>`).join('')}</div>` : ''}
        ${c.obs ? `<div class="contact-obs">${c.obs}</div>` : ''}
        <div class="contact-actions">
          <button class="btn-wa-small" onclick="mostrarModalWA(${i})">💬 WhatsApp</button>
          <button class="btn-del" onclick="eliminar(${i})">Eliminar</button>
        </div>
        <div class="contact-time">📍 ${c.hora}</div>
      </div>
    </div>
  `).join('');
}

function eliminar(i) {
  if (!confirm(`¿Eliminar a ${contactos[i].nombre}?`)) return;
  contactos.splice(i, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(contactos));
  actualizarCounter();
  renderLista();
}

function limpiarTodo() {
  if (!contactos.length) return;
  if (!confirm(`¿Borrar los ${contactos.length} contactos? Exportá el CSV primero.`)) return;
  contactos = [];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(contactos));
  actualizarCounter();
  renderLista();
}

// ── EXPORT CSV ──────────────────────────────────────────────
function exportarCSV() {
  if (!contactos.length) { showToast('No hay contactos aún'); return; }
  const cols = ['Nombre', 'Celular', 'Productos', 'Observaciones', 'Hora'];
  const rows = contactos.map(c => [
    `"${c.nombre}"`,
    `"${c.celular}"`,
    `"${c.productos.join(' | ')}"`,
    `"${c.obs.replace(/"/g,'""')}"`,
    `"${c.hora}"`
  ].join(','));
  const csv = [cols.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bricchi_expo2026_${new Date().toLocaleDateString('es-AR').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV exportado');
}

// ── WHATSAPP MODAL ──────────────────────────────────────────
function mostrarModalWA(i) {
  waContactIdx = i;
  const c = contactos[i];
  const num = c.celular.replace(/\D/g,'');
  document.getElementById('waNumero').textContent = c.celular;
  document.getElementById('waPreview').textContent = WA_MENSAJE(c.nombre, c.productos);
  document.getElementById('waOverlay').classList.add('open');
}

function abrirWhatsapp() {
  const c = contactos[waContactIdx];
  let num = c.celular.replace(/\D/g,'');
  // Normalizar número argentino
  if (num.startsWith('0')) num = num.slice(1);
  if (!num.startsWith('54')) num = '54' + num;
  if (num.length === 12 && num[2] !== '9') num = num.slice(0,2) + '9' + num.slice(2);
  const msg = encodeURIComponent(WA_MENSAJE(c.nombre, c.productos));
  window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
  cerrarModal();
}

function cerrarModal(e) {
  if (e && e.target !== document.getElementById('waOverlay')) return;
  document.getElementById('waOverlay').classList.remove('open');
  waContactIdx = null;
}

// ── TOAST ───────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SERVICE WORKER ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
