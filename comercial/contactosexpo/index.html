<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c8220a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bricchi — Maní 2026</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Barlow',sans-serif;
  background:#f5f5f5;
  color:#111;
  -webkit-font-smoothing:antialiased;
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid #eee;}
.hdr-stripe{height:5px;background:#c8220a;}
.hdr-inner{
  display:flex;align-items:center;
  padding:11px 14px 13px;gap:12px;
}
.hdr-logo{height:36px;object-fit:contain;flex-shrink:0;}
.hdr-sep{width:1px;height:34px;background:#e0e0e0;flex-shrink:0;}
.hdr-ev{flex:1;}
.hdr-ev .t1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:900;
  color:#c8220a;letter-spacing:1px;
  text-transform:uppercase;line-height:1;
}
.hdr-ev .t2{font-size:10px;color:#999;margin-top:2px;}
.badge{
  background:#c8220a;border-radius:8px;
  padding:5px 11px;text-align:center;flex-shrink:0;
}
.badge .bn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:900;color:#fff;
  line-height:1;display:block;
}
.badge .bl{
  font-size:7px;font-weight:700;
  color:rgba(255,255,255,.7);
  letter-spacing:1px;text-transform:uppercase;
}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;}
.tab{
  flex:1;padding:14px 6px;
  border:none;background:transparent;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;
  color:#bbb;cursor:pointer;
  border-bottom:3px solid transparent;
  margin-bottom:-2px;transition:color .15s;
}
.tab.on{color:#111;border-bottom-color:#c8220a;}

/* VIEWS */
.vw{display:none;}.vw.on{display:block;}

/* SECTION */
.sec{padding:16px 14px 0;}
.sh{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;
  letter-spacing:2.5px;text-transform:uppercase;
  color:#aaa;margin-bottom:8px;padding-left:2px;
}

/* INPUT CARD */
.card{
  background:#fff;border-radius:12px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
  margin-bottom:14px;
}
.ir{
  display:flex;align-items:center;
  padding:0 14px;border-bottom:1px solid #f0f0f0;
  min-height:64px;gap:12px;
}
.ir:last-child{border-bottom:none;}
.ico{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
.ib{flex:1;padding:10px 0;}
.ib label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  color:#bbb;margin-bottom:3px;
}
.ib input{
  width:100%;border:none;outline:none;
  font-family:'Barlow',sans-serif;
  font-size:18px;font-weight:600;
  color:#111;background:transparent;
}
.ib input[type=tel]{
  font-size:26px;font-weight:700;
  letter-spacing:2px;
  font-family:'Barlow Condensed',sans-serif;
}
.ib input::placeholder{color:#ddd;}

/* PRODUCTOS */
.pg{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:14px;
}
.pc{
  background:#fff;
  border:2.5px solid #eee;
  border-radius:12px;
  padding:18px 10px 14px;
  text-align:center;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
  transition:border-color .12s,background .12s;
}
.pc .pi{font-size:36px;display:block;margin-bottom:8px;}
.pc .pn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;
  color:#555;line-height:1.1;
}
.pc.s{border-color:#c8220a;background:#fff5f4;}
.pc.s .pn{color:#c8220a;}

/* OBS */
.oc{
  background:#fff;border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
  margin-bottom:14px;overflow:hidden;
}
.oc textarea{
  width:100%;border:none;outline:none;
  font-family:'Barlow',sans-serif;
  font-size:15px;color:#333;
  padding:14px 16px;resize:none;
  background:transparent;min-height:82px;
}
.oc textarea::placeholder{color:#ccc;}

/* BTN SAVE */
.bsv{
  display:block;
  width:calc(100% - 28px);
  margin:0 14px 30px;padding:19px;
  background:#c8220a;color:#fff;
  border:none;border-radius:12px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:900;
  letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(200,34,10,.35);
  transition:transform .1s,box-shadow .1s;
}
.bsv:active{transform:scale(.97);box-shadow:0 2px 8px rgba(200,34,10,.2);}

/* LIST */
.ltb{
  display:flex;align-items:center;
  padding:14px 14px 10px;gap:7px;
}
.ltt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:900;flex:1;
  text-transform:uppercase;
}
.bcsv{
  background:#111;color:#fff;
  border:none;border-radius:9px;
  padding:9px 13px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;
}
.btr{
  background:none;color:#ccc;
  border:1.5px solid #eee;border-radius:9px;
  padding:9px 11px;font-size:15px;cursor:pointer;
}

/* CONTACT CARD */
.ci{
  background:#fff;margin:6px 14px;
  border-radius:12px;padding:14px 15px;
  box-shadow:0 1px 4px rgba(0,0,0,.09);
  display:flex;gap:11px;align-items:flex-start;
}
.cn2{
  background:#c8220a;color:#fff;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:900;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.cb{flex:1;min-width:0;}
.cnm{font-size:17px;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctel{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:700;
  color:#c8220a;letter-spacing:2px;margin-bottom:5px;
}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.ctag{
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:800;
  letter-spacing:.8px;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;
  background:#fff0ee;color:#c8220a;
  border:1px solid #f5c5be;
}
.cobs{font-size:12px;color:#999;font-style:italic;margin-bottom:4px;line-height:1.3;}
.cact{display:flex;gap:7px;margin-top:8px;}
.bwa{
  background:#25D366;color:#fff;
  border:none;border-radius:7px;padding:7px 13px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;
}
.bdl{
  background:none;border:1.5px solid #eee;
  border-radius:7px;padding:7px 11px;
  font-size:12px;color:#ccc;cursor:pointer;
}
.chr{font-size:10px;color:#ccc;margin-top:4px;}
.emp{text-align:center;padding:60px 28px;}
.emp .ei{font-size:48px;margin-bottom:10px;}
.emp p{font-size:14px;color:#bbb;line-height:1.5;}
.lb{height:40px;}

/* MODAL */
.ovl{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.ovl.op{display:flex;}
.mdl{
  background:#fff;width:100%;max-width:480px;
  border-radius:20px 20px 0 0;
  padding:10px 20px 44px;
  box-shadow:0 -4px 0 #c8220a;
  animation:up .26s cubic-bezier(.34,1.2,.64,1);
}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mh{width:36px;height:4px;background:#eee;border-radius:2px;margin:8px auto 18px;}
.ml{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:3px;}
.mn{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;margin-bottom:2px;color:#111;}
.mt{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#c8220a;letter-spacing:2px;margin-bottom:14px;}
.mp{
  background:#f0faf4;border-radius:12px 12px 12px 4px;
  padding:13px 15px;font-size:14px;line-height:1.55;
  color:#333;margin-bottom:16px;
  border-left:4px solid #25D366;
}
.bowa{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:16px;
  background:#25D366;color:#fff;border:none;
  border-radius:12px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:19px;font-weight:900;letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(37,211,102,.35);
  margin-bottom:9px;
}
.bmc{
  display:block;width:100%;padding:13px;
  background:none;border:1.5px solid #eee;
  border-radius:12px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;color:#bbb;cursor:pointer;
}

/* TOAST */
.tst{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#111;color:#fff;
  padding:12px 22px;border-radius:50px;
  font-size:14px;font-weight:700;
  white-space:nowrap;
  box-shadow:0 8px 28px rgba(0,0,0,.3);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);
  z-index:999;pointer-events:none;
}
.tst.sh{transform:translateX(-50%) translateY(0);}
</style>
</head>

      <div class="ir">

          <label>Celular / WhatsApp</label>
          <input type="tel" id="fC" placeholder="358 412 3456" inputmode="tel" autocomplete="off">
        </div>
      </div>

  </div>

  <div class="sec">
    <div class="sh">¿Qué le interesa?</div>
    <div class="pg">
      <div class="pc" data-p="Sembradoras Apache" onclick="tog(this)"><span class="pi">🌱</span><div class="pn">Sembradoras Apache</div></div>
      <div class="pc" data-p="Tractores" onclick="tog(this)"><span class="pi">🚜</span><div class="pn">Tractores</div></div>
      <div class="pc" data-p="Palas Cargadoras" onclick="tog(this)"><span class="pi">🏗️</span><div class="pn">Palas Cargadoras</div></div>

  <div class="ltb">
    <span class="ltt">Contactos del día</span>
    <button class="btr" onclick="clr()">🗑</button>

  </div>
  <div id="lb"></div>
  <div class="lb"></div>
</div>

  <div class="mdl">
    <div class="mh"></div>
    <div class="ml">Enviar WhatsApp a</div>
    <div class="mn" id="mN">—</div>
    <div class="mt" id="mT">—</div>
    <div class="mp" id="mP"></div>
    <button class="bowa" onclick="owa()">

      ABRIR WHATSAPP
    </button>
    <button class="bmc" onclick="cm()">Cerrar</button>
  </div>
</div>

<div class="tst" id="tst"></div>

<script>
const KEY='bricchi_mani_2026';
let cs=JSON.parse(localStorage.getItem(KEY)||'[]');
let sp=new Set(),wi=null;
const MSG=(n,ps)=>`Hola ${n}! 👋 Te escribimos desde *Bricchi Hnos.* — fue un placer charlar en el stand de *Apache* en el Circuito del Maní 2026. Quedamos a disposición para enviarte info sobre *${ps.length?ps.join(', '):'nuestros productos'}*. ¡Cualquier consulta, acá estamos!`;
function goTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['form','list'][i]===t));
  document.querySelectorAll('.vw').forEach(v=>v.classList.remove('on'));
  document.getElementById('vw-'+t).classList.add('on');
  if(t==='list')rl();
}
function tog(el){const p=el.dataset.p;sp.has(p)?sp.delete(p):sp.add(p);el.classList.toggle('s',sp.has(p));}
function sv(){
  const n=document.getElementById('fN').value.trim();
  const c=document.getElementById('fC').value.trim();
  const o=document.getElementById('fO').value.trim();
  if(!n){toast('⚠️ Ingresá el nombre');return;}
  if(!c){toast('⚠️ Ingresá el celular');return;}
  cs.unshift({id:Date.now(),n,c,ps:[...sp],o,h:new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})});
  ls();rst();toast('✅ '+n+' guardado');
  setTimeout(()=>swm(0),650);
}
function rst(){
  document.getElementById('fN').value='';
  document.getElementById('fC').value='';
  document.getElementById('fO').value='';
  sp.clear();
  document.querySelectorAll('.pc').forEach(b=>b.classList.remove('s'));
}
function uc(){document.getElementById('cNum').textContent=cs.length;}
uc();
function rl(){
  const el=document.getElementById('lb');
  if(!cs.length){el.innerHTML='<div class="emp"><div class="ei">📋</div><p>Todavía no hay contactos.<br>¡A conseguir clientes!</p></div>';return;}
  el.innerHTML=cs.map((c,i)=>`
    <div class="ci">
      <div class="cn2">${cs.length-i}</div>
      <div class="cb">
        <div class="cnm">${c.n}</div>
        <div class="ctel">${c.c}</div>
        ${c.ps.length?`<div class="ctags">${c.ps.map(p=>`<span class="ctag">${p}</span>`).join('')}</div>`:''}
        ${c.o?`<div class="cobs">${c.o}</div>`:''}
        <div class="cact">
          <button class="bwa" onclick="swm(${i})">💬 WhatsApp</button>
          <button class="bdl" onclick="dl(${i})">Eliminar</button>
        </div>
        <div class="chr">⏱ ${c.h}</div>
      </div>
    </div>`).join('');
}
function dl(i){if(!confirm('¿Eliminar a '+cs[i].n+'?'))return;cs.splice(i,1);ls();rl();}
function clr(){if(!cs.length||!confirm('¿Borrar los '+cs.length+' contactos? Exportá el CSV primero.'))return;cs=[];ls();rl();}
function xcsv(){
  if(!cs.length){toast('No hay contactos aún');return;}
  const rows=cs.map(c=>['"'+c.n+'"','"'+c.c+'"','"'+c.ps.join(' | ')+'"','"'+(c.o||'')+'"','"'+c.h+'"'].join(','));
  const csv=['Nombre,Celular,Productos,Observaciones,Hora',...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='bricchi_mani2026_'+new Date().toLocaleDateString('es-AR').replace(/\//g,'-')+'.csv';
  a.click();toast('✅ CSV exportado');
}
function swm(i){
  wi=i;const c=cs[i];
  document.getElementById('mN').textContent=c.n;
  document.getElementById('mT').textContent=c.c;
  document.getElementById('mP').textContent=MSG(c.n,c.ps);
  document.getElementById('ovl').classList.add('op');
}
function owa(){
  const c=cs[wi];
  let n=c.c.replace(/\D/g,'');
  if(n.startsWith('0'))n=n.slice(1);
  if(!n.startsWith('54'))n='54'+n;
  if(n.length===12&&n[2]!=='9')n=n.slice(0,2)+'9'+n.slice(2);
  window.open('https://wa.me/'+n+'?text='+encodeURIComponent(MSG(c.n,c.ps)),'_blank');
  cm();
}
function cm(e){
  if(e&&e.target!==document.getElementById('ovl'))return;
  document.getElementById('ovl').classList.remove('op');wi=null;
}
function ls(){localStorage.setItem(KEY,JSON.stringify(cs));uc();}
function toast(m){
  const t=document.getElementById('tst');
  t.textContent=m;t.classList.add('sh');
  setTimeout(()=>t.classList.remove('sh'),2300);
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
