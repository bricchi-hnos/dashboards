<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disponibilidad Maquinaria — Bricchi Hnos SA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--surface3:#1e2330;
  --border:#252b3b;--border2:#2e3650;
  --text:#d4daf0;--muted:#5a6480;--accent:#3b82f6;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#fb923c;--purple:#a78bfa;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
/* LOADER */
#loader{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .5s}
#loader.out{opacity:0;pointer-events:none}
.l-logo{display:flex;flex-direction:column;align-items:center;gap:12px}
.l-logo img{height:48px;width:auto}
.l-logo span{font-family:var(--sans);font-size:12px;color:#666;letter-spacing:.12em;text-transform:uppercase;font-weight:500}
.l-logo span b{color:#D42B2B}
.l-bar{width:280px;height:2px;background:#e5e7eb;border-radius:2px;overflow:hidden}
.l-fill{height:100%;width:0;background:#D42B2B;transition:width .4s}
.l-msg{font-family:var(--mono);font-size:10px;color:#999}
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.h-logo{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.h-logo b{color:var(--text)}
.h-meta{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;gap:14px;align-items:center}
.h-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* TOOLBAR */
.toolbar{display:flex;gap:8px;align-items:center;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar input[type=text]{background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:3px;outline:none;width:220px}
.toolbar input:focus{border-color:var(--accent)}
.toolbar select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;border-radius:3px;outline:none;cursor:pointer}
.toolbar select:focus{border-color:var(--accent)}
.tb-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.sep{width:1px;height:20px;background:var(--border2)}
#cnt-lbl{font-family:var(--mono);font-size:10px;color:var(--muted)}
/* TABLA PRINCIPAL */
main{padding:16px 20px}
.tbl-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
thead th:hover{color:var(--text)}
thead th.asc::after{content:' ↑'}
thead th.desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:.1s}
tbody tr:hover{background:var(--surface2)}
tbody tr.expanded{background:var(--surface2)}
tbody td{padding:7px 12px;font-family:var(--mono);font-size:11px;white-space:nowrap}
.nm{text-align:right}
/* Badges numéricos en tabla */
.n-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;border-radius:10px;font-family:var(--mono);font-size:11px;font-weight:600;padding:0 6px}
.nb-green{background:rgba(34,197,94,.15);color:var(--green)}
.nb-orange{background:rgba(251,146,60,.15);color:var(--orange)}
.nb-blue{background:rgba(59,130,246,.15);color:var(--accent)}
.nb-red{background:rgba(239,68,68,.15);color:var(--red)}
.nb-muted{background:rgba(90,100,128,.12);color:var(--muted)}
.nb-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
/* FILA DE DETALLE (expandible) */
.det-row{display:none}
.det-row.open{display:table-row}
.det-row td{padding:0 !important;border-bottom:1px solid var(--border2)}
.det-inner{padding:14px 20px;background:var(--surface3);border-top:1px solid var(--border)}
.det-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-top:10px}
/* Secciones de detalle */
.dsec{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;overflow:hidden}
.dsec-head{padding:8px 12px;font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dsec-body{overflow-x:auto}
.dsec-body table{width:100%}
.dsec-body thead th{background:var(--surface3);font-size:8px;padding:5px 8px;position:static}
.dsec-body tbody td{padding:5px 8px;font-size:10px}
.np{padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted)}
/* Texto coloreado */
.tg{color:var(--green)}.tr{color:var(--red)}.ty{color:var(--yellow)}.to{color:var(--orange)}.tb{color:var(--accent)}.tm{color:var(--muted)}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-family:var(--mono);text-transform:uppercase}
.bg{background:rgba(34,197,94,.15);color:var(--green)}
.by{background:rgba(245,158,11,.15);color:var(--yellow)}
.br{background:rgba(239,68,68,.15);color:var(--red)}
.bb{background:rgba(59,130,246,.15);color:var(--accent)}
.bo{background:rgba(251,146,60,.15);color:var(--orange)}
.bp{background:rgba(167,139,250,.15);color:var(--purple)}
.row-mark td:first-child{border-left:3px solid var(--accent)}
</style>
</head>
<body>
<div id="loader">
  <div class="l-logo">
    <img src="https://www.bricchihnos.com/assets/bricchi-hnos-logotype.png" alt="Bricchi Hnos SA" onerror="this.style.display='none'">
    <span>BRICCHI HNOS SA &middot; <b>Disponibilidad</b></span>
  </div>
  <div class="l-bar"><div class="l-fill" id="lfill"></div></div>
  <div class="l-msg" id="lmsg">Cargando...</div>
</div>
<header>
  <div class="h-logo">BRICCHI HNOS SA &middot; <b>Disponibilidad de Maquinaria</b></div>
  <div class="h-meta"><span><span class="h-dot"></span><span id="h-ts">--:--</span></span><span id="h-tot"></span></div>
</header>
<div class="toolbar">
  <span class="tb-label">Buscar:</span>
  <input type="text" id="f-buscar" placeholder="Nombre, ref o marca..." oninput="applyFilter()">
  <span class="tb-label">Marca:</span>
  <select id="f-marca" onchange="applyFilter()"><option value="">Todas</option></select>
  <div class="sep"></div>
  <span class="tb-label">Mostrar:</span>
  <select id="f-disp" onchange="applyFilter()">
    <option value="">Todos</option>
    <option value="stock">Con stock</option>
    <option value="proveedor">En proveedor</option>
    <option value="demanda">Con demanda descubierta</option>
  </select>
  <div class="sep"></div>
  <span id="cnt-lbl"></span>
</div>
<main>
  <div class="tbl-box">
    <div class="tw">
      <table id="tbl-main">
        <thead>
          <tr>
            <th onclick="sortBy('producto')" id="th-producto">Producto</th>
            <th onclick="sortBy('ref_interna')" id="th-ref_interna">Ref.</th>
            <th onclick="sortBy('marca')" id="th-marca">Marca</th>
            <th onclick="sortBy('existencia_libre')" class="nm" id="th-existencia_libre">Existencia libre</th>
            <th onclick="sortBy('existencia_con_ov')" class="nm" id="th-existencia_con_ov">Exist. con OV</th>
            <th onclick="sortBy('en_proveedor_libre')" class="nm" id="th-en_proveedor_libre">Proveedor libre</th>
            <th onclick="sortBy('en_proveedor_con_ov')" class="nm" id="th-en_proveedor_con_ov">Prov. con OV</th>
            <th onclick="sortBy('demanda_sin_cobertura')" class="nm" id="th-demanda_sin_cobertura">Demanda S/C</th>
            <th onclick="sortBy('fecha_oc_mas_reciente')" id="th-fecha_oc_mas_reciente">&#218;lt. OC</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const U='https://rvumvnslydaobvvsywtu.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2dW12bnNseWRhb2J2dnN5d3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzM3NDksImV4cCI6MjA4NzQ0OTc0OX0.rE06TXMzBhvX0Uwzh2UquSFJs6CP18d81xrCC7MmX3c';
const H={'apikey':K,'Authorization':'Bearer '+K};

let FLAT=[],OC=[],SOL=[];
let RESUMEN=[];
let sortCol='producto', sortAsc=true;
let expandedPid=null;

const setL=(p,m)=>{document.getElementById('lfill').style.width=p+'%';document.getElementById('lmsg').textContent=m;};
const fd=d=>d?new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'&#8212;';
const pr=s=>(s||'').replace(/^\[[^\]]+\]\s*/,'').replace(/^MARCA:\s*/i,'').trim();
const nb=(n,cls)=>n>0?`<span class="n-badge ${cls}">${n}</span>`:`<span class="n-badge nb-muted">0</span>`;

async function init(){
  // Funcion con paginacion para superar limite de 1000 filas del REST API
  const get=async(base,p,m)=>{
    setL(p,m);
    var all=[];
    var offset=0;
    var limit=1000;
    while(true){
      var url=base+(base.indexOf('?')>=0?'&':'?')+'limit='+limit+'&offset='+offset;
      var r=await fetch(url,{headers:H});
      if(!r.ok)return all;
      var d=await r.json();
      if(!Array.isArray(d))return all;
      all=all.concat(d);
      if(d.length<limit)break;
      offset+=limit;
    }
    return all;
  };
  FLAT=await get(`${U}/rest/v1/vista_maquinaria_flat?select=*&order=numero_serie.asc`,25,'Cargando maquinaria...');
  OC=await get(`${U}/rest/v1/vista_oc_maquinaria?select=*&order=fecha_oc.desc`,60,'Cargando OC...');
  SOL=await get(`${U}/rest/v1/vista_sol_sin_asignar?select=*&order=fecha_ov.desc`,85,'Cargando OV...');

  buildResumen();
  document.getElementById('h-ts').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  // Poblar marcas
  const marcas=[...new Set(RESUMEN.map(r=>r.marca).filter(Boolean))].sort();
  marcas.forEach(m=>document.getElementById('f-marca').innerHTML+=`<option value="${m}">${m}</option>`);
  applyFilter();
  setL(100,'Listo');
  setTimeout(()=>document.getElementById('loader').classList.add('out'),300);
}

function buildResumen(){
  // Agrupar FLAT por product_id
  const pmap=new Map();
  FLAT.forEach(r=>{
    if(!r.product_id)return;
    if(!pmap.has(r.product_id))pmap.set(r.product_id,{
      product_id:r.product_id,
      producto:pr(r.producto||''),
      ref_interna:r.ref_interna||'',
      marca:r.marca||'',
      categoria:r.categoria||'',
      existencia_libre:0,existencia_con_ov:0,existencia_total:0,
      en_proveedor_libre:0,en_proveedor_con_ov:0,en_proveedor_total:0,
      demanda_sin_cobertura:0,fecha_oc_mas_reciente:null
    });
    const p=pmap.get(r.product_id);
    if(r.cantidad_stock>0&&!r.en_customer){
      p.existencia_total++;
      if(r.nro_ov)p.existencia_con_ov++;
      else p.existencia_libre++;
    }
  });

  // OC pendientes deduplicadas - por pol_id (cada linea es unica)
  const ocSeen=new Set();
  OC.forEach(r=>{
    if(!r.product_id||r.serie_asignada)return;
    // Incluir 'pending' y 'partial' con qty_received < qty_pedida (aun no recibida)
    var esPendiente=r.estado_recepcion==='pending'||(r.estado_recepcion==='partial'&&(r.qty_received||0)<(r.qty_pedida||1));
    if(!esPendiente)return;
    // Deduplicar por pol_id si disponible, sino por nro_oc+ov+proveedor
    const key=r.pol_id!=null?(r.product_id+'|pol|'+r.pol_id):(r.product_id+'|'+r.nro_oc+'|'+(r.nro_ov_vinculada||'')+'|'+(r.proveedor||''));
    if(ocSeen.has(key))return;
    ocSeen.add(key);
    if(!pmap.has(r.product_id)){
      // Extraer ref_interna del campo producto de OC: "[REF MARCA: ..." -> "REF"
      const refMatch=(r.producto||'').match(/^\[([^\s\]]+)/);
      const refOC=refMatch?refMatch[1]:'';
      pmap.set(r.product_id,{
        product_id:r.product_id,producto:pr(r.producto||''),ref_interna:refOC,marca:'',categoria:'',
        existencia_libre:0,existencia_con_ov:0,existencia_total:0,
        en_proveedor_libre:0,en_proveedor_con_ov:0,en_proveedor_total:0,
        demanda_sin_cobertura:0,fecha_oc_mas_reciente:null
      });
    }
    const p=pmap.get(r.product_id);
    p.en_proveedor_total++;
    if(r.nro_ov_vinculada&&r.nro_ov_vinculada!=='')p.en_proveedor_con_ov++;
    else p.en_proveedor_libre++;
    if(!p.fecha_oc_mas_reciente||r.fecha_oc>p.fecha_oc_mas_reciente)p.fecha_oc_mas_reciente=r.fecha_oc;
  });

  // Demanda sin cobertura
  SOL.forEach(r=>{
    if(!r.product_id||r.asignada||(r.oc_vinculada&&r.oc_vinculada!==''))return;
    if(pmap.has(r.product_id))pmap.get(r.product_id).demanda_sin_cobertura++;
  });

  RESUMEN=[...pmap.values()].filter(p=>p.existencia_total>0||p.en_proveedor_total>0);
  document.getElementById('h-tot').textContent=`${RESUMEN.length} productos . ${RESUMEN.reduce((s,p)=>s+p.existencia_total,0)} en stock . ${RESUMEN.reduce((s,p)=>s+p.en_proveedor_total,0)} en proveedor`;
}

function applyFilter(){
  const q=(document.getElementById('f-buscar').value||'').toLowerCase();
  const marca=document.getElementById('f-marca').value;
  const disp=document.getElementById('f-disp').value;
  let data=RESUMEN.filter(p=>{
    if(q&&!p.producto.toLowerCase().includes(q)&&!p.ref_interna.toLowerCase().includes(q)&&!p.marca.toLowerCase().includes(q))return false;
    if(marca&&p.marca!==marca)return false;
    if(disp==='stock'&&p.existencia_total===0)return false;
    if(disp==='proveedor'&&p.en_proveedor_total===0)return false;
    if(disp==='demanda'&&p.demanda_sin_cobertura===0)return false;
    return true;
  });
  // Ordenar
  data.sort((a,b)=>{
    const va=a[sortCol]??'',vb=b[sortCol]??'';
    if(typeof va==='number')return sortAsc?va-vb:vb-va;
    return sortAsc?(va>vb?1:-1):(va<vb?1:-1);
  });
  document.getElementById('cnt-lbl').textContent=`${data.length} producto${data.length!==1?'s':''}`;
  renderTabla(data);
}

function renderTabla(data){
  const tbody=document.getElementById('tbl-body');
  tbody.innerHTML=data.map(p=>`
    <tr onclick="toggleDet(${p.product_id})" class="${expandedPid===p.product_id?'expanded row-mark':''}">
      <td>${p.producto}</td>
      <td class="tb">${p.ref_interna||'&#8212;'}</td>
      <td class="tm">${p.marca||'&#8212;'}</td>
      <td class="nm">${nb(p.existencia_libre,'nb-green')}</td>
      <td class="nm">${nb(p.existencia_con_ov,'nb-yellow')}</td>
      <td class="nm">${nb(p.en_proveedor_libre,'nb-orange')}</td>
      <td class="nm">${nb(p.en_proveedor_con_ov,'nb-blue')}</td>
      <td class="nm">${nb(p.demanda_sin_cobertura,'nb-red')}</td>
      <td class="tm">${fd(p.fecha_oc_mas_reciente)}</td>
    </tr>
    <tr class="det-row ${expandedPid===p.product_id?'open':''}" id="det-${p.product_id}">
      <td colspan="9"><div class="det-inner" id="det-inner-${p.product_id}"></div></td>
    </tr>
  `).join('');
}

function toggleDet(pid){
  if(expandedPid===pid){expandedPid=null;applyFilter();return;}
  expandedPid=pid;
  applyFilter();
  // Render detalle
  const inner=document.getElementById('det-inner-'+pid);
  if(inner)inner.innerHTML=buildDet(pid);
}

function buildDet(pid){
  const p=RESUMEN.find(x=>x.product_id===pid);
  if(!p)return '';

  // Series en stock
  const enStock=FLAT.filter(r=>r.product_id===pid&&r.cantidad_stock>0&&!r.en_customer);
  // OC pendientes por este producto
  const ocSeen=new Set();
  const ocPend=[];
  OC.filter(r=>r.product_id===pid&&!r.serie_asignada&&(r.estado_recepcion==='pending'||(r.estado_recepcion==='partial'&&(r.qty_received||0)<(r.qty_pedida||1)))).forEach(r=>{
    const key=r.pol_id!=null?('pol|'+r.pol_id):(r.nro_oc+'|'+(r.nro_ov_vinculada||'')+'|'+(r.proveedor||''));
    if(ocSeen.has(key))return;
    ocSeen.add(key);
    ocPend.push(r);
  });
  const ocConOV=ocPend.filter(r=>r.nro_ov_vinculada&&r.nro_ov_vinculada!=='');
  const ocLibre=ocPend.filter(r=>!r.nro_ov_vinculada||r.nro_ov_vinculada==='');
  // OC libre agrupadas por nro_oc con conteo
  const ocLibreMap=new Map();
  ocLibre.forEach(r=>{if(!ocLibreMap.has(r.nro_oc))ocLibreMap.set(r.nro_oc,{...r,cnt:0});ocLibreMap.get(r.nro_oc).cnt++;});
  const ocLibreList=[...ocLibreMap.values()];
  // Demanda sin cobertura
  const solSin=SOL.filter(r=>r.product_id===pid&&!r.asignada&&(!r.oc_vinculada||r.oc_vinculada===''));

  return `
    <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:10px">
      &#9654; ${p.producto}${p.marca?' &mdash; '+p.marca:''} &nbsp;|&nbsp; Ref: ${p.ref_interna||'&#8212;'}
    </div>
    <div class="det-grid">
      <!-- EXISTENCIAS -->
      <div class="dsec">
        <div class="dsec-head"><span class="dot" style="background:var(--green)"></span>En Stock &mdash; ${enStock.length} unidad${enStock.length!==1?'es':''}</div>
        ${enStock.length?`<div class="dsec-body"><table>
          <thead><tr><th>Serie</th><th>Dep&oacute;sito</th><th>OV</th><th>Cliente</th><th>Estado</th></tr></thead>
          <tbody>${enStock.map(r=>`<tr>
            <td class="tg">${r.numero_serie}</td>
            <td>${r.deposito||'&#8212;'}</td>
            <td>${r.nro_ov?`<span class="tb">${r.nro_ov}</span>`:'<span class="tm">&#8212;</span>'}</td>
            <td>${r.cliente||'<span class="tm">Disponible</span>'}</td>
            <td>${r.nro_ov?`<span class="badge by">${r.estado_facturacion_ov||r.estado_ov||'&#8212;'}</span>`:'<span class="badge bg">Libre</span>'}</td>
          </tr>`).join('')}</tbody>
        </table></div>`:'<div class="np">Sin stock en dep&oacute;sito</div>'}
      </div>
      <!-- EN PROVEEDOR CON OV -->
      <div class="dsec">
        <div class="dsec-head"><span class="dot" style="background:var(--accent)"></span>En Proveedor con OV &mdash; ${ocConOV.length} unidad${ocConOV.length!==1?'es':''}</div>
        ${ocConOV.length?`<div class="dsec-body"><table>
          <thead><tr><th>OC</th><th>Fecha OC</th><th>OV</th><th>Cliente</th></tr></thead>
          <tbody>${ocConOV.map(r=>`<tr>
            <td class="tb">${r.nro_oc}</td>
            <td>${fd(r.fecha_oc)}</td>
            <td class="tb">${r.nro_ov_vinculada}</td>
            <td>${r.cliente_ov||'&#8212;'}</td>
          </tr>`).join('')}</tbody>
        </table></div>`:'<div class="np">Sin OC con OV vinculada</div>'}
      </div>
      <!-- EN PROVEEDOR LIBRE -->
      <div class="dsec">
        <div class="dsec-head"><span class="dot" style="background:var(--orange)"></span>En Proveedor Libre &mdash; ${ocLibre.length} unidad${ocLibre.length!==1?'es':''}</div>
        ${ocLibreList.length?`<div class="dsec-body"><table>
          <thead><tr><th>OC</th><th>Fecha OC</th><th>Proveedor</th><th class="nm">Cant.</th></tr></thead>
          <tbody>${ocLibreList.map(r=>`<tr>
            <td class="to">${r.nro_oc}</td>
            <td>${fd(r.fecha_oc)}</td>
            <td>${r.proveedor||'&#8212;'}</td>
            <td class="nm to">${r.cnt}</td>
          </tr>`).join('')}</tbody>
        </table></div>`:'<div class="np">Sin OC libres pendientes</div>'}
      </div>
      <!-- DEMANDA SIN COBERTURA -->
      <div class="dsec">
        <div class="dsec-head"><span class="dot" style="background:var(--red)"></span>Demanda Sin Cobertura &mdash; ${solSin.length} OV</div>
        ${solSin.length?`<div class="dsec-body"><table>
          <thead><tr><th>OV</th><th>Cliente</th><th>Vendedor</th><th>Fecha OV</th></tr></thead>
          <tbody>${solSin.map(r=>`<tr>
            <td class="tr">${r.nro_ov}</td>
            <td>${r.cliente||'&#8212;'}</td>
            <td>${r.vendedor||'&#8212;'}</td>
            <td>${fd(r.fecha_ov)}</td>
          </tr>`).join('')}</tbody>
        </table></div>`:'<div class="np">Sin demanda descubierta &#10003;</div>'}
      </div>
    </div>`;
}

function sortBy(col){
  if(sortCol===col)sortAsc=!sortAsc;
  else{sortCol=col;sortAsc=true;}
  // Actualizar header activo
  document.querySelectorAll('thead th').forEach(th=>{th.classList.remove('asc','desc');});
  const th=document.getElementById('th-'+col);
  if(th)th.classList.add(sortAsc?'asc':'desc');
  applyFilter();
}

init().catch(e=>{document.getElementById('lmsg').textContent='Error: '+e.message;document.getElementById('lmsg').style.color='#ef4444';});
</script>
</body>
</html>
